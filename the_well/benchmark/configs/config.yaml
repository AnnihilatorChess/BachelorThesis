defaults:
  - _self_  # apply root body first, then group defaults + experiment can override
  - trainer: defaults
  - optimizer: adam
  - experiment: ???
  - server: ???
  - resume_overrides: no_overrides
temporal_bundle_size: 1 # 1 = no bundling, K > 1 = predict K timesteps at once (top-level so Hydra doesn't pass it to WellDataModule)
seed: 42 # global RNG seed for model init and dataloader shuffling; use --multirun seed=1,2,3 for multiple seeds
run_name: "" # optional W&B run name prefix; produces "{run_name}-{model}-seed{seed}"
data:
  train_data_fraction: 1.0 # Fraction of training data files to use (e.g. 0.5 for 50%)
  val_data_fraction: 1.0   # Fraction of validation data files to use (e.g. 0.5 for 50%)
  n_steps_input: 4
  n_steps_output: 1
  n_steps_output_train: 1 # for pushforward training, this will automatically be set to 4 if pushforward=True
  normalization_type:
    _partial_: true
    _target_: the_well.data.normalization.ZScoreNormalization
  train_dataset: # options: WellDataset or DeltaWellDataset
    _partial_: true
    _target_: the_well.data.datasets.WellDataset
# model:
#   gradient_checkpointing: False
data_workers: 8
# torch.compile knobs. Disabled by default; opt-in per experiment for runs
# where Python/dispatch overhead dominates (e.g. small models with small
# batches and long unrolls — PDEBench-FNO BPTT-91 at batch=1 is the canonical
# case). First iteration pays 30s-3min compile cost; steady-state is faster.
compile:
  enabled: False
  mode: default       # "default" | "reduce-overhead" | "max-autotune"
  fullgraph: False    # require a single graph (no graph breaks); strict
wandb_project_name: "bsc_data_test"
wandb_group: "" # optional W&B group name; if empty, uses auto-generated experiment_name
