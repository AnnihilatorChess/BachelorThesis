# @package _global_
# Server config for JKU student server (Xeon E5-2630 v4, 10 cores / 20 threads).
# By default uses the standard datasets/ folder relative to the project root.
# Override with an absolute path if datasets are stored elsewhere, e.g.:
#   data.well_base_path=/publicdata/the_well
data:
  well_base_path: "../../datasets/"
experiment_dir: "experiments/"
data_workers: 2
