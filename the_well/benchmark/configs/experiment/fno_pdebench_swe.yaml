# @package _global_
# PDEBench parity: FNO autoregressive (AR) training on 2D Shallow-Water.
#
# Mirrors `pdebench/models/fno/train.py` with `training_type=autoregressive`.
# At each step the model predicts the next frame; the per-step MSEs are summed
# across all 91 unrolled steps and a single .backward() runs at the end.
#
# Unroll horizon: PDEBench's `config_rdb.yaml` has
#   t_train=101, initial_step=10, reduced_resolution_t=1
# so the loop `for t in range(initial_step, t_train)` produces
#   91 = 101 - 10 gradient-tracked steps.

defaults:
  - /data: pdebench_swe
  - /model: fno_pdebench
  - /lr_scheduler: cosine_with_warmup
  - override /optimizer: adam_pdebench
  - override /trainer: bptt
  - _self_

trainer:
  loss_fn:
    _target_: the_well.benchmark.metrics.MSE
  formatter: channels_first_default
  rollout_val_frequency: 2
  # Full-trajectory FNO-AR: 91 gradient-tracked steps, no PF warmup.
  bptt_unroll_steps: 91
  pf_warmup_steps: 0
  loss_reduction: sum

data:
  n_steps_input: 10
  batch_size: 5  # PDEBench's config_rdb.yaml batch_size

name: fno_pdebench_swe
