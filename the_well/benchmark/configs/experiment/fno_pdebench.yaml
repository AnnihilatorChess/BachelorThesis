# @package _global_
# PDEBench-protocol experiment for FNO.
# See docs/benchmark-comparability.md for the full protocol comparison.
#
# Not replicated (known deviations from PDEBench, flagged in docs):
#  - Spatial / temporal downsampling for 1D Burgers (256 × 40 in PDEBench)
#  - No-normalization (PDEBench trains raw; we z-score)
#  - 90/10 test==val split (our converted data is 800/100/100 / 8000/1000/1000)
# Override data.batch_size=50 (Burgers) or =5 (SWE) for strict PDEBench parity.

defaults:
  - /data: pdebench_swe
  - /model: fno_pdebench
  - /lr_scheduler: cosine_with_warmup
  - override /optimizer: adam_pdebench
  - _self_

trainer:
  loss_fn:
    _target_: the_well.benchmark.metrics.MSE
  formatter: channels_first_default
  rollout_val_frequency: 2

data:
  n_steps_input: 10
  batch_size: 64

name: fno_pdebench
