# @package _global_
# PDEBench parity: U-Net pushforward PF-20 training on 1D Burgers (nu=1e-3).
#
# Mirrors `pdebench/models/unet/train.py` with `ar_mode=True, pushforward=True,
# unroll_step=20`. Per batch:
#   - 11 leading steps run under `torch.no_grad()` (rollout-only warmup).
#   - 20 trailing steps run under autograd; their per-step MSEs are summed.
#   - Single .backward() over the summed 20-step loss.
#
# Unroll horizon: `config_Bgs.yaml` has t_train=200, initial_step=10,
# reduced_resolution=4, reduced_resolution_t=5, unroll_step=20. Effective
# trajectory length after [::5] is ceil(201/5)=41:
#     warmup = (41 - 10) - 20 = 11
#     unroll = unroll_step    = 20
#
# Uses the parity dataset `pdebench_1d_burgers_pdebench` (256 × 41), produced
# by `scripts/convert_pdebench_1d_burgers.py --variant pdebench`.

defaults:
  - /data: pdebench_1d_burgers_pdebench
  - /model: unet_classic_pdebench
  - /lr_scheduler: cosine_with_warmup
  - override /optimizer: adam_pdebench
  - override /trainer: bptt
  - _self_

trainer:
  loss_fn:
    _target_: the_well.benchmark.metrics.MSE
  formatter: channels_first_default
  rollout_val_frequency: 2
  bptt_unroll_steps: 20
  pf_warmup_steps: 11
  loss_reduction: sum

data:
  n_steps_input: 10
  batch_size: 50  # PDEBench's config_Bgs.yaml batch_size

name: unet_pdebench_burgers
