_target_: the_well.benchmark.trainer.Trainer
epochs: 100
val_frequency: 1
rollout_val_frequency: 2
short_validation_length: 20
max_rollout_steps: 100
num_time_intervals: 5
make_rollout_videos: False
checkpoint_frequency: 0 # Frequency of saving checkpoints. If 0, only use best/most recent. Setting this to 1 uses A LOT of disk space.
# enable_amp: True
loss_fn: ???
checkpoint_path: "" # This is a default that is overridden by the code
###############
# added configs
###############
# pushforward configs
pushforward: False
pushforward_final_probs: [0.4, 0.2, 0.2, 0.2]
pushforward_warmup_epochs: 20
# Noise injection configs
noise_injection: False
noise_std: 0.01
noise_anneal: False # linearly increase from 0 to noise_std over first half of training
# Temporal bundling configs
temporal_bundle_size: 1 # 1 = standard single-step, K > 1 = predict K timesteps at once
# Extended evaluation metrics
extended_metrics: True
valid_rollout_threshold: 0.2 # nRMSE threshold for valid rollout length
correlation_time_threshold: 0.8 # PearsonR threshold for correlation time
# Temporal loss interval boundaries.
# null = equal-width bins based on num_time_intervals (dataset-agnostic, safe default).
# Explicit list of integers = fixed boundaries, e.g. [0, 6, 12, 13, 30] for The Well paper.
# NOTE: fixed boundaries must be set before running benchmarks — they cannot be changed retrospectively.
temporal_loss_boundaries: [0, 6, 12, 13, 30]
